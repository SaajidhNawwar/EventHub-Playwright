name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install chrome --with-deps

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Test Azure connectivity
      run: |
        curl -v "https://eastus.api.playwright.microsoft.com" || true
        az account show
        az resource show --ids "/subscriptions/4ab00bb6-3ed4-4e41-9125-09fb82e1f6a7/resourceGroups/RRD/providers/microsoft.loadtestservice/playwrightworkspaces/saajidh-playwright" || true

    - name: Run Playwright tests
      env:
        CI: true
        PLAYWRIGHT_SERVICE_URL: ${{ vars.PLAYWRIGHT_SERVICE_URL }}
        BASE_URL: ${{ secrets.BASE_URL }}
        EMAIL: ${{ secrets.EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
        AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        DEBUG: azure:playwright*,pw:browser*,pw:api*,azure*
      run: npx playwright test --config=playwright.service.config.js --workers=1

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30